name: parkiq-virs
region: blr
services:
  - name: virs
    github:
      repo: yuvrajshr/ParkIQ
      branch: main
      deploy_on_push: true
    source_dir: virs-service
    dockerfile_path: virs-service/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xs
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 3
    routes:
      - path: /
